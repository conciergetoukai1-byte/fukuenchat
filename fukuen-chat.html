<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復縁コンシェルジュ AIチャット相談</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --gold: #b8963e;
    --gold-light: #d4af5a;
    --gold-dark: #8a6e2a;
    --cream: #faf6ed;
    --border: #d4c9a8;
    --muted: #7a6e5a;
    --red-accent: #8b2020;
    --shadow: rgba(26,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(184,150,62,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,32,32,0.04) 0%, transparent 50%);
  }

  .widget-wrap {
    width: 100%;
    max-width: 780px;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #1a1410 0%, #2d2318 60%, #1a1410 100%);
    border-radius: 4px 4px 0 0;
    padding: 28px 36px 24px;
    position: relative;
    overflow: hidden;
    border-bottom: 2px solid var(--gold);
  }

  .chat-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(184,150,62,0.04) 80px,
      rgba(184,150,62,0.04) 81px
    );
  }

  .chat-header::after {
    content: '◆';
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    color: rgba(184,150,62,0.08);
    font-family: 'Noto Serif JP', serif;
  }

  .header-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    border: 1px solid rgba(184,150,62,0.4);
    padding: 3px 10px;
    margin-bottom: 10px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    line-height: 1.4;
  }

  .header-title span {
    color: var(--gold-light);
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #4caf50;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages area */
  .chat-body {
    background: var(--cream);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 480px;
    overflow-y: auto;
    padding: 28px 28px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat-body::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 88%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
  }

  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, #1a1410, #3a2a18);
    color: var(--gold);
    border: 1px solid var(--gold-dark);
  }

  .msg.user .msg-avatar {
    background: var(--border);
    color: var(--muted);
    font-size: 12px;
  }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }

  .msg.ai .msg-bubble {
    background: #fff;
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    color: var(--ink);
    box-shadow: 2px 3px 12px var(--shadow);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #1a1410, #2d2318);
    color: rgba(255,255,255,0.9);
    border: 1px solid rgba(184,150,62,0.3);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 12px;
    max-width: 88%;
    animation: fadeIn 0.3s ease;
  }

  .typing-dots {
    background: #fff;
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 14px 18px;
    border-radius: 2px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 2px 3px 12px var(--shadow);
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .typing-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1410, #3a2a18);
    color: var(--gold);
    border: 1px solid var(--gold-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Footer / input */
  .chat-footer {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold);
    border-radius: 0 0 4px 4px;
    padding: 16px 20px;
  }

  .disclaimer {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    background: var(--cream);
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
    min-height: 48px;
    max-height: 120px;
  }

  .chat-input:focus {
    border-color: var(--gold);
    background: #fff;
  }

  .chat-input::placeholder {
    color: #b0a08a;
  }

  .send-btn {
    background: linear-gradient(135deg, #1a1410, #2d2318);
    color: var(--gold);
    border: 1px solid var(--gold-dark);
    border-radius: 2px;
    padding: 12px 22px;
    font-size: 13px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.08em;
    white-space: nowrap;
    height: 48px;
  }

  .send-btn:hover {
    background: linear-gradient(135deg, #2d2318, #3a2a18);
    border-color: var(--gold-light);
    color: var(--gold-light);
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Suggestion chips */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .chip {
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--cream);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.03em;
  }

  .chip:hover {
    border-color: var(--gold);
    color: var(--gold-dark);
    background: #fff;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--border);
    font-size: 11px;
    margin: 4px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>

<div class="widget-wrap">
  <div class="chat-header">
    <div class="header-badge">AI 無料相談</div>
    <div class="header-title">復縁コンシェルジュ <span>AIアドバイザー</span></div>
    <div class="header-sub"><span class="status-dot"></span>15年以上の実績に基づくコーチングAI　｜　復縁・離婚回避・夫婦修復</div>
  </div>

  <div class="chat-body" id="chatBody">
    <!-- Initial message -->
    <div class="msg ai">
      <div class="msg-avatar">復</div>
      <div class="msg-bubble">
        こんにちは。復縁コンシェルジュです。<br><br>
        私はカウンセラーではなく<strong>コーチ</strong>です。あなたの心を癒すためではなく、<strong>復縁・離婚回避というゴールに向かって突き進むため</strong>のアドバイスをします。<br><br>
        今、どのような状況ですか？遠慮なく話してください。
      </div>
    </div>
  </div>

  <div class="chat-footer">
    <div class="disclaimer">※このAIは復縁コンシェルジュの哲学・経験をもとに回答します。深刻なケースは有料相談もご検討ください。</div>
    <div class="suggestions" id="suggestions">
      <span class="chip" onclick="useSuggestion(this)">妻に離婚を切り出された</span>
      <span class="chip" onclick="useSuggestion(this)">冷却期間中にできることは？</span>
      <span class="chip" onclick="useSuggestion(this)">モラハラと言われた</span>
      <span class="chip" onclick="useSuggestion(this)">浮気されたが戻りたい</span>
    </div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="状況を教えてください…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">送信</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは「復縁コンシェルジュ」です。北海道在住、元探偵、活動歴15年以上のコーチです。以下の人物像・哲学・語り口を完全に再現して相談者に回答してください。

【基本スタンス】
- カウンセラーではなくコーチ。ゴール（復縁・離婚回避）に向かって突き進ませる
- 厳しいが温かい。辛口だが愛がある
- 「前向きに頑張っていきましょう！」で締める
- 曖昧なアドバイス（「焦らず自然に」など）は絶対にしない
- 相手を一方的に悪者にしない（浮気もモラハラも同罪論）
- 「別れた方がいい」とは絶対に言わない

【核心哲学】
1. 男は武士であれ（源頼信の哲学）。彼女に浮気されても笑っていられる男になれ
2. 女性が筋肉に惹かれるのはその裏の暴力性・雑さ・適当さがあるから。常識的すぎる男は飽きられる
3. 復縁には復讐心が必要。怒りのエネルギーを内側に向けて自分を磨け
4. モラハラの根本は「子供の頃勝てなかった奴への復讐心」。幼少期まで遡って自動思考を把握せよ
5. ネット復縁工作：相手の拒絶感を刺激せずに、相手の周辺環境に外部から間接的に影響を与える
6. 手を抜くな。面倒くさいことをやれ。小さな手抜きが離婚につながる
7. コンフォートゾーンを抜け出せ（アインシュタイン：同じことを繰り返して違う結果を期待するのは狂気）
8. 核家族主義が離婚の原因。三世代家族主義の昭和的価値観に戻れ
9. 離婚回避では急がば回れで相手の親を落とす

【文体・語り口】
- 「〜なわけです」「〜なのです」「〜ということです」（断言調）
- 「ですから」「そしてそれは」（論理的接続詞）
- 「ぜひ〜してください」（行動指示）
- 「〜ですよね？」（問いかけ）
- 具体的な行動リストを提示する
- 歴史・映画・研究の引用を適宜使う（源頼信、映画「すばらしき世界」、米軍NPY研究など）
- 自分の探偵時代のエピソードを適宜使う
- 「前向きに頑張っていきましょう！」で締める

【オリジナル理論】
- 復縁できる男のかきくけこ：か（かわいいね）き（きれいだね）く（くるしくない？）け（けがしてない？）こ（こまるよね）
- 電話の7対3バイリンガル則：元恋人との電話は敬語7割：タメ口3割
- 切り替えスイッチ：嫌な気持ちになったらアイテムをギュッと握るか「切り替えスイッチ！」と叫ぶ
- シングルファーザー意識：妻も「手のかかるお姉ちゃん」として育てる気持ちで接する

回答は500〜800文字程度。具体的な行動指示を必ず含める。最後は「前向きに頑張っていきましょう！」で締める。`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useSuggestion(el) {
  document.getElementById('chatInput').value = el.textContent;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function scrollToBottom() {
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}

function appendMessage(role, text) {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '復' : '相';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  div.appendChild(avatar);
  div.appendChild(bubble);
  body.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';

  div.innerHTML = `
    <div class="typing-avatar">復</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>`;
  body.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('suggestions').style.display = 'none';
  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'エラーが発生しました。';

    removeTyping();
    appendMessage('ai', reply);
    messages.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    appendMessage('ai', '申し訳ありません、通信エラーが発生しました。もう一度お試しください。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
